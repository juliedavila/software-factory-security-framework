# Software Factory Security Framework (SF²)
# GitLab Pages deployment with MkDocs Material

image: python:3.11

stages:
  - test
  - build
  - deploy

# Cache pip packages for faster builds
cache:
  paths:
    - .cache/pip

before_script:
  # Install system dependencies for mkdocs-material social plugin and PDF generation
  # (cairo/pango for social cards and with-pdf plugin)
  - apt-get update
  - apt-get install -y --no-install-recommends libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 shared-mime-info
  # Install Python dependencies
  - pip install --cache-dir .cache/pip -r requirements.txt

# Validate: Check framework consistency (runs on all branches and MRs)
validate:
  stage: test
  script:
    - chmod +x scripts/validate-consistency.sh
    - ./scripts/validate-consistency.sh
  except:
    - master
  only:
    - merge_requests
    - branches

# Test: Build docs on all branches (except main) to catch errors early
test:
  stage: test
  script:
    - mkdocs build --strict --verbose
  artifacts:
    paths:
      - site/
    expire_in: 1 hour
  except:
    - master
  only:
    - merge_requests
    - branches

# Build: Generate site with auto-generated PDF on master branch
build:
  stage: build
  script:
    - mkdocs build --strict --verbose
    - echo "Site built successfully"
    - ls -lah site/
    - ls -lah site/pdf/ || echo "PDF directory check"
  artifacts:
    paths:
      - site/
    expire_in: 1 day
  only:
    - master

# Deploy: Publish to GitLab Pages
pages:
  stage: deploy
  dependencies:
    - build
  script:
    - mv site public
    - echo "Deploying to GitLab Pages at $CI_PAGES_URL"
  artifacts:
    paths:
      - public
  only:
    - master

# Note: PDF is now automatically generated during regular build
# This manual job is kept for backwards compatibility if needed
pdf:
  stage: build
  script:
    - mkdocs build --strict
    - mkdir -p pdf
    - cp site/pdf/sf2-framework.pdf pdf/ || echo "PDF generation failed"
  artifacts:
    paths:
      - pdf/
    expire_in: 30 days
  only:
    - tags
  when: manual

# Lint markdown files
lint:
  stage: test
  image: node:18
  before_script:
    - npm install -g markdownlint-cli2
  script:
    - markdownlint-cli2 "docs/**/*.md" || echo "Linting warnings found"
  allow_failure: true
  except:
    - master
