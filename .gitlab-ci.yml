# Software Factory Security Framework (SF²)
# GitLab Pages deployment with MkDocs Material

image: python:3.11

stages:
  - test
  - build
  - deploy

# Cache pip packages for faster builds
cache:
  paths:
    - .cache/pip

before_script:
  # Install system dependencies for mkdocs-material social plugin and PDF generation
  # (cairo/pango for social cards and with-pdf plugin)
  - apt-get update
  - apt-get install -y --no-install-recommends libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 shared-mime-info
  # Install Python dependencies
  - pip install --cache-dir .cache/pip -r requirements.txt

# Validate: Check framework consistency (runs on all branches and MRs)
validate:
  stage: test
  script:
    - chmod +x scripts/validate-consistency.sh
    - ./scripts/validate-consistency.sh
  except:
    - master
  only:
    - merge_requests
    - branches

# Test: Build docs on all branches (except main) to catch errors early
test:
  stage: test
  script:
    - mkdocs build --strict --verbose
  artifacts:
    paths:
      - site/
    expire_in: 1 hour
  except:
    - master
  only:
    - merge_requests
    - branches

# Build: strict site + the downloadable core PDF, on master.
#
# Two-config split (see mkdocs.pdf.yml for the why):
#   1. `mkdocs build --strict` uses the default config (NO with-pdf) so link
#      validation stays on and the build is green.
#   2. `mkdocs build -f mkdocs.pdf.yml` is a SEPARATE non-strict build that
#      generates the core-of-SF² PDF (Foundation -> Conditions -> Positioning
#      -> Investment) into pdf-build/. We copy that PDF into site/pdf/ so it
#      ships with Pages and the home-page "Download Core PDF" button resolves
#      at /pdf/sf2-framework.pdf.
build:
  stage: build
  script:
    - mkdocs build --strict --verbose
    - mkdocs build -f mkdocs.pdf.yml
    # Guard: the PDF build is non-strict, so it will not fail the pipeline if the
    # PDF silently goes missing or comes out empty/truncated. Assert it exists and
    # clears a size floor before shipping it, so a broken PDF fails the deploy
    # loudly instead of publishing a dead download button.
    - test -f pdf-build/pdf/sf2-framework.pdf || { echo "ERROR core PDF was not generated"; exit 1; }
    - PDF_BYTES=$(stat -c%s pdf-build/pdf/sf2-framework.pdf); echo "core PDF size ${PDF_BYTES} bytes"
    - test "$PDF_BYTES" -ge 51200 || { echo "ERROR core PDF is suspiciously small (${PDF_BYTES} bytes, floor 51200)"; exit 1; }
    - mkdir -p site/pdf
    - cp pdf-build/pdf/sf2-framework.pdf site/pdf/sf2-framework.pdf
    - echo "Site built (strict) and core PDF generated"
    - ls -lah site/pdf/
  artifacts:
    paths:
      - site/
    expire_in: 1 day
  only:
    - master

# Deploy: Publish to GitLab Pages
pages:
  stage: deploy
  dependencies:
    - build
  script:
    - mv site public
    - echo "Deploying to GitLab Pages at $CI_PAGES_URL"
  artifacts:
    paths:
      - public
  only:
    - master

# Lint markdown files
lint:
  stage: test
  image: node:18
  before_script:
    - npm install -g markdownlint-cli2
  script:
    - markdownlint-cli2 "docs/**/*.md" || echo "Linting warnings found"
  allow_failure: true
  except:
    - master
