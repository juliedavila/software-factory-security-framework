# SF² — GitHub Pages build + deploy (migration Phase 1, STAGING).
#
# Ports the GitLab CI (.gitlab-ci.yml): strict MkDocs build + the separate
# non-strict mkdocs.pdf.yml core-PDF build + the same hard-gates (page count
# + brand-font embedding) that make a broken PDF fail the deploy loudly.
#
# SAFETY: this is a STAGING deploy to *.github.io. It deletes site/CNAME before
# publishing so GitHub Pages does NOT claim sf2framework.com (which is still
# served live by GitLab Pages). The custom-domain flip is Phase 2, deferred.

name: Deploy SF2 (GitHub Pages — staging)

on:
  push:
    branches: [master, visual-refresh-migration]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # mkdocs-git-revision-date-localized needs full history
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: System deps (cairo/pango for imaging+PDF, poppler for the PDF gate)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            shared-mime-info poppler-utils
      - name: Python deps
        run: pip install -r requirements.txt
      - name: Build site (strict — full link validation)
        run: mkdocs build --strict --verbose
      - name: Build core PDF (non-strict overlay)
        run: mkdocs build -f mkdocs.pdf.yml
      - name: PDF hard-gate (existence + size + page count + brand-font embedding)
        run: |
          set -e
          test -f pdf-build/pdf/sf2-framework.pdf || { echo "ERROR core PDF was not generated"; exit 1; }
          PDF_BYTES=$(stat -c%s pdf-build/pdf/sf2-framework.pdf); echo "core PDF size ${PDF_BYTES} bytes"
          test "$PDF_BYTES" -ge 51200 || { echo "ERROR core PDF is suspiciously small (${PDF_BYTES} bytes, floor 51200)"; exit 1; }
          PDF_PAGES=$(pdfinfo pdf-build/pdf/sf2-framework.pdf | awk '/^Pages:/{print $2}'); echo "core PDF pages ${PDF_PAGES}"
          test "$PDF_PAGES" -ge 60 || { echo "ERROR core PDF looks truncated (${PDF_PAGES} pages, floor 60; full core is ~72)"; exit 1; }
          pdffonts pdf-build/pdf/sf2-framework.pdf | tee /tmp/sf2-fonts.txt
          for FONT in Source-Serif-4 JetBrains-Mono Cardo; do grep -q "$FONT" /tmp/sf2-fonts.txt || { echo "ERROR brand font ${FONT} not embedded in core PDF"; exit 1; }; done
          echo "PDF-fidelity gate passed (${PDF_PAGES} pages; Source Serif 4 + JetBrains Mono + Cardo embedded)"
      - name: Ship the PDF with the site
        run: |
          mkdir -p site/pdf
          cp pdf-build/pdf/sf2-framework.pdf site/pdf/sf2-framework.pdf
      - name: Drop CNAME so STAGING does not claim the live custom domain
        run: rm -f site/CNAME
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
