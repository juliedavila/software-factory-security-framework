site_name: Software Factory Security Framework (SF²)
site_description: A Complete Mental Model for Securing Software Factories at Scale
site_author: Julie Davila
site_url: https://sf2framework.com

repo_name: software-factory-security-framework
repo_url: https://github.com/juliedavila/software-factory-security-framework
edit_uri: edit/master/docs/

# Pages intentionally outside the nav (special 404 page + assets readme).
# Keeps `mkdocs build --strict` from flagging them as orphaned.
not_in_nav: |
  /404.md
  /assets/README.md

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
    - toc.follow
    - toc.integrate
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Source Serif 4
    code: JetBrains Mono
  logo: assets/logo.svg
  favicon: assets/favicon.ico

nav:
  - Home: index.md
  - Executive Summary: executive-summary.md

  - Foundation:
    - Software Factory Definition: 01-foundation/software-factory-definition.md
    - "The Atelier and the Factory": 01-foundation/atelier-engagement.md

  - Universal Security Conditions:
    - Overview: 02-stewardship/overview.md
    - "Supply Chain (#1)": 02-stewardship/supply-chain.md
    - Third-Party: 02-stewardship/third-party.md
    - Process: 02-stewardship/process.md
    - Runtime: 02-stewardship/runtime.md
    - Adaptive Capacity: 02-stewardship/adaptive-capacity.md

  - Strategic Positioning:
    - Two-Axis Model: 03-positioning/two-axis-model.md
    - Four Strategic Positions: 03-positioning/strategic-positions.md
    - Movement Paths: 03-positioning/movement-paths.md

  - Investment Portfolio:
    - Portfolio Framework: 04-investment/portfolio-framework.md
    - BAU vs Scaling: 04-investment/bau-vs-scaling.md
    - Platform Effects: 04-investment/platform-effects.md
    - Evaluation Criteria: 04-investment/evaluation-criteria.md

  - Contextual Modifiers:
    - Overview: 05-context/overview.md
    - Attack Landscape: 05-context/attack-landscape.md
    - Supply Chain Complexity: 05-context/supply-chain-complexity.md
    - Regulatory Constraints: 05-context/regulatory-constraints.md
    - Crisis Events: 05-context/crisis-events.md
    - Change Capacity: 05-context/change-capacity.md
    - Relationship Health: 05-context/relationship-health.md
    - AI Saturation: 05-context/ai-saturation.md
    - PQC Exposure: 05-context/pqc-exposure.md

  - Implementation Guides:
    - Studio: 06-implementation/studio.md
    - Lean: 06-implementation/lean.md
    - Craft: 06-implementation/craft.md
    - Mass: 06-implementation/mass.md

  - Framework Relationships:
    - NIST SSDF: 07-relationships/nist-ssdf.md
    - OWASP SAMM: 07-relationships/owasp-samm.md
    - BSIMM: 07-relationships/bsimm.md
    - OWASP ASVS: 07-relationships/owasp-asvs.md

  - Use Cases: 08-use-cases/scenarios.md

  # Nav order is INTENTIONAL: the Coadaptive Security Layer (dir 10) is placed
  # before AI Integration (dir 09) on purpose. Coadaptive is the conceptual
  # capstone; the per-vendor AI Integration guides are the perishable, practical
  # off-ramp before the Appendix. The visible tab labels carry no numbers, so
  # readers never perceive a sequence break; this is a deliberate reading arc,
  # not a numbering bug. (SF² v0.8, ISC-31; ratified after council review.)
  - Coadaptive Security Layer:
    - Overview: 10-coadaptive/overview.md
    - "01 The Three-Layer Model": 10-coadaptive/01-three-layer-model.md
    - "02 The AI-Era Threat Surface": 10-coadaptive/02-ai-era-threat-surface.md
    - "03 The Unit of Defense": 10-coadaptive/03-unit-of-defense.md
    - "04 Boundary Enforcement": 10-coadaptive/04-boundary-enforcement.md
    - "05 Authorization at Agent Scale": 10-coadaptive/05-authorization-at-agent-scale.md
    - "06 Input Trust Is a Category Error": 10-coadaptive/06-input-trust-is-a-category-error.md

  - AI Integration: 09-ai-integration/overview.md

  - Appendix:
    - Framework Evolution: appendix/evolution.md
    - Glossary: appendix/glossary.md
    - References: appendix/references.md
    - Accessibility: appendix/accessibility.md
    - Quadrant Rename (v0.5 to v0.6): appendix/quadrant-rename-v06.md
    - AI Framework Summary: ai-framework-summary.md

  - Contributing: contributing.md

plugins:
  - search:
      lang: en
  # The three per-vendor AI Integration pages (claude/chatgpt/gemini) were
  # consolidated into 09-ai-integration/overview.md in the v1.0 per-chapter pass.
  # Preserve their old URLs so existing links and search results still resolve.
  - redirects:
      redirect_maps:
        09-ai-integration/claude.md: 09-ai-integration/overview.md
        09-ai-integration/chatgpt.md: 09-ai-integration/overview.md
        09-ai-integration/gemini.md: 09-ai-integration/overview.md
  - social:
      cards: true
      cards_layout_options:
        background_color: "#2C4A6B"  # Azul Talavera (SF² primary accent, brand-spec §2)
        color: "#ffffff"
        font_family: Roboto
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - minify:
      minify_html: true
  # NOTE: the combined-PDF export (with-pdf) lives in a SEPARATE overlay config,
  # mkdocs.pdf.yml, NOT here. weasyprint cannot resolve cross-page anchors when
  # the whole site collapses into one PDF, so with-pdf throws hundreds of link
  # warnings that fail `mkdocs build --strict` (which CI runs on every branch and
  # the Pages deploy). Keeping it out of the default config lets the strict build
  # stay green with full link validation intact. The downloadable core PDF is
  # produced by `mkdocs build -f mkdocs.pdf.yml` (non-strict, scoped to the core
  # sections). See mkdocs.pdf.yml and the `pdf` CI job.
  - print-site:
      add_to_navigation: true
      print_page_title: 'Complete Framework'
      add_full_urls: false
      enumerate_headings: true
      enumerate_figures: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true
      permalink_title: Link to this section
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/juliedavila
      name: Julie Davila on GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/thisjulie/
  version:
    provider: mike
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: Thanks! Help us improve by opening an issue.

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2025-2026 Julie Davila | Licensed under CC BY 4.0
